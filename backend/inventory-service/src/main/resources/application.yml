server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/asw
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092

flyway:
  enabled: true
  locations: classpath:db/migration
