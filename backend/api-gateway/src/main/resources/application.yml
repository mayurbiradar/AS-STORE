server:
  port: 9090
spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/products/**,/images/**
            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/orders/**
            - id: inventory-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/inventory/**
  application:
    name: api-gateway
jwt:
  secret: auth_service_jwt_secret_change_in_prod_to_strong_secret_at_least_32_chars_long